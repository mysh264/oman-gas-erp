services:
  app:
    build:
      context: /home/mahmoud/app/gas-erp
      dockerfile: /home/mahmoud/app/gas-erp/Dockerfile
    container_name: gas_erp_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - /home/mahmoud/app/gas-erp:/var/www/html
      - /home/mahmoud/app/gas-erp/storage:/var/www/html/storage
    depends_on:
      - postgres
      - redis
    networks:
      - gas_erp_internal

  nginx:
    image: nginx:alpine
    container_name: gas_erp_nginx
    restart: unless-stopped
    volumes:
      - /home/mahmoud/app/gas-erp:/var/www/html:ro
      - /home/mahmoud/app/gas-erp/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/mahmoud/app/gas-erp/storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - gas_erp_internal
      - docker_shared

  postgres:
    image: postgres:16-alpine
    container_name: gas_erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gas_erp
      POSTGRES_USER: gas_erp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /home/mahmoud/app/gas-erp/.docker/postgres:/var/lib/postgresql/data
    networks:
      - gas_erp_internal

  redis:
    image: redis:7-alpine
    container_name: gas_erp_redis
    restart: unless-stopped
    volumes:
      - /home/mahmoud/app/gas-erp/.docker/redis:/data
    networks:
      - gas_erp_internal

  queue:
    build:
      context: /home/mahmoud/app/gas-erp
      dockerfile: /home/mahmoud/app/gas-erp/Dockerfile
    container_name: gas_erp_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - /home/mahmoud/app/gas-erp:/var/www/html
      - /home/mahmoud/app/gas-erp/storage:/var/www/html/storage
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - gas_erp_internal

  scheduler:
    build:
      context: /home/mahmoud/app/gas-erp
      dockerfile: /home/mahmoud/app/gas-erp/Dockerfile
    container_name: gas_erp_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - /home/mahmoud/app/gas-erp:/var/www/html
      - /home/mahmoud/app/gas-erp/storage:/var/www/html/storage
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - gas_erp_internal

  composer:
    build:
      context: /home/mahmoud/app/gas-erp
      dockerfile: /home/mahmoud/app/gas-erp/Dockerfile
    container_name: gas_erp_composer
    working_dir: /var/www/html
    entrypoint: composer
    volumes:
      - /home/mahmoud/app/gas-erp:/var/www/html
    networks:
      - gas_erp_internal

  artisan:
    build:
      context: /home/mahmoud/app/gas-erp
      dockerfile: /home/mahmoud/app/gas-erp/Dockerfile
    container_name: gas_erp_artisan
    working_dir: /var/www/html
    entrypoint: php artisan
    volumes:
      - /home/mahmoud/app/gas-erp:/var/www/html
      - /home/mahmoud/app/gas-erp/storage:/var/www/html/storage
    depends_on:
      - postgres
      - redis
    networks:
      - gas_erp_internal

  npm:
    image: node:22-alpine
    container_name: gas_erp_npm
    working_dir: /var/www/html
    entrypoint: npm
    volumes:
      - /home/mahmoud/app/gas-erp:/var/www/html
    networks:
      - gas_erp_internal

networks:
  gas_erp_internal:
    driver: bridge

  docker_shared:
    external: true
