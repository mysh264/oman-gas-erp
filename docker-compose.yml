name: gas-erp

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile

x-app-service: &app-service
  <<: *app-build
  restart: unless-stopped
  working_dir: /var/www/html
  volumes:
    - .:/var/www/html
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - gas_erp_internal

services:
  app:
    <<: *app-service
    container_name: gas_erp_app

  nginx:
    image: nginx:alpine
    container_name: gas_erp_nginx
    restart: unless-stopped
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - gas_erp_internal
      - docker_shared

  postgres:
    image: postgres:16-alpine
    container_name: gas_erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gas_erp
      POSTGRES_USER: gas_erp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./.docker/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gas_erp_user -d gas_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gas_erp_internal

  redis:
    image: redis:7-alpine
    container_name: gas_erp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./.docker/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gas_erp_internal

  queue:
    <<: *app-service
    container_name: gas_erp_queue
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90

  scheduler:
    <<: *app-service
    container_name: gas_erp_scheduler
    command: php artisan schedule:work

  composer:
    <<: *app-build
    container_name: gas_erp_composer
    working_dir: /var/www/html
    entrypoint: composer
    profiles:
      - tools
    volumes:
      - .:/var/www/html
    networks:
      - gas_erp_internal

  artisan:
    <<: *app-service
    container_name: gas_erp_artisan
    entrypoint: php artisan
    restart: "no"
    profiles:
      - tools

  npm:
    image: node:22-alpine
    container_name: gas_erp_npm
    working_dir: /var/www/html
    entrypoint: npm
    profiles:
      - tools
    volumes:
      - .:/var/www/html
    networks:
      - gas_erp_internal

networks:
  gas_erp_internal:
    driver: bridge

  docker_shared:
    external: true
